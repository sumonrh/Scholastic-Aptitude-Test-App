<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SAT Vocabulary Web App</title>
  <style>
    :root {
      --bg: #0b1220;
      --surface: #111b33;
      --surface2: #172544;
      --text: #e8f0fb;
      --muted: #97a7c6;
      --primary: #5aa6ff;
      --accent: #f0a43d;
      --border: #2a3b59;
      --shadow: 0 12px 26px rgba(0, 0, 0, 0.45);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Inter', 'Segoe UI', Roboto, Arial, sans-serif;
      background: radial-gradient(circle at 10% 20%, #1b2b52 0%, #0b1220 45%, #060a15 100%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 30px 12px;
    }

    .app-shell {
      width: min(980px, 100%);
      display: grid;
      gap: 16px;
    }

    .card {
      background: linear-gradient(145deg, var(--surface), var(--surface2));
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: var(--shadow);
      padding: 20px;
      line-height: 1.45;
    }

    h1, h2 {
      margin: 0;
      font-weight: 700;
    }

    .small {
      color: var(--muted);
      margin-top: 8px;
    }

    .button-grid {
      display: grid;
      gap: 12px;
      margin: 18px 0;
    }

    button {
      background: linear-gradient(145deg, var(--primary), #3f89f9);
      border: 0;
      border-radius: 10px;
      color: #ffffff;
      font-size: 16px;
      font-weight: 600;
      padding: 12px 14px;
      cursor: pointer;
      transition: transform .16s ease, filter .16s ease;
    }

    button:hover { transform: translateY(-1px); filter: brightness(1.08); }
    button:active { transform: translateY(0); }

    button.ghost {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
    }

    .hidden { display: none !important; }

    #quiz-options label { display: block; margin: 8px 0; }
    #quiz-options input { margin-right: 8px; }
    #vocab-list, #progress-list { list-style-type: none; padding-left: 0; margin: 0; }
    #vocab-list li, #progress-list li { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08); border-radius: 9px; padding: 10px; margin: 6px 0; }

    .status { font-size: 0.92rem; color: var(--accent); margin-top: 4px; }
  </style>
</head>
<body>
  <main class="app-shell">
    <section class="card" id="activity-card">
      <h1>SAT Vocab Challenge</h1>
      <p class="small">No login needed. Start right away with learning, quiz, and progress tracking (guest mode).</p>
      <div class="button-grid">
        <button id="learn-btn">Learn Vocabulary</button>
        <button id="quiz-btn">Take Quiz</button>
        <button id="progress-btn">View Progress</button>
      </div>
      <p class="status" id="status-bar">Ready</p>
    </section>

    <section class="card hidden" id="learn-card">
      <h2>Vocabulary Library</h2>
      <ul id="vocab-list"></ul>
      <div class="button-grid">
        <button id="learn-back-btn" class="ghost">Back</button>
      </div>
    </section>

    <section class="card hidden" id="quiz-card">
      <h2>Quiz Mode</h2>
      <div id="quiz-question"></div>
      <div class="options" id="quiz-options"></div>
      <p class="small" id="quiz-progress"></p>
      <div class="button-grid">
        <button id="quiz-next-btn">Submit & Next</button>
        <button id="quiz-cancel-btn" class="ghost">Cancel</button>
      </div>
    </section>

    <section class="card hidden" id="progress-card">
      <h2>Progress Log</h2>
      <ul id="progress-list"></ul>
      <div class="button-grid">
        <button id="progress-back-btn" class="ghost">Back</button>
      </div>
    </section>
  </main>

  <script>
    const currentUser = 'guest';
    let vocab = [];
    let quizPool = [];
    let currentQuestionIndex = 0;
    let score = 0;

    const ui = {
      activity: document.getElementById('activity-card'),
      learn: document.getElementById('learn-card'),
      quiz: document.getElementById('quiz-card'),
      progress: document.getElementById('progress-card'),
      status: document.getElementById('status-bar'),
      vocabList: document.getElementById('vocab-list'),
      progressList: document.getElementById('progress-list'),
      question: document.getElementById('quiz-question'),
      options: document.getElementById('quiz-options'),
      progress: document.getElementById('quiz-progress')
    };

    function setView(view) {
      [ui.activity, ui.learn, ui.quiz, ui.progress].forEach(el => el.classList.add('hidden'));
      view.classList.remove('hidden');
      ui.status.textContent = view === ui.activity ? 'Ready' : `Current section: ${view.id}`;
    }

    async function loadVocab() {
      const res = await fetch('/api/vocab');
      vocab = await res.json();
      ui.status.textContent = `Loaded ${vocab.length} vocab entries`;
    }

    function renderLearn() {
      ui.vocabList.innerHTML = '';
      if (!vocab.length) {
        ui.vocabList.innerHTML = '<li>No vocab found.</li>';
        return;
      }
      vocab.forEach((v, i) => {
        const li = document.createElement('li');
        li.textContent = `${i + 1}. ${v.question} → ${v.answer}`;
        ui.vocabList.appendChild(li);
      });
    }

    function shuffle(x) {
      const a = [...x];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function startQuiz() {
      if (vocab.length < 4) {
        alert('At least 4 vocab entries are required for quiz mode.');
        return;
      }
      quizPool = shuffle(vocab).slice(0, 10).map((item) => {
        const decoys = shuffle(vocab.filter(x => x.id !== item.id).map(x => x.answer)).slice(0, 3);
        const options = shuffle([item.answer, ...decoys]);
        return { question: item.question, correct: item.answer, options };
      });
      score = 0;
      currentQuestionIndex = 0;
      renderQuizQuestion();
      setView(ui.quiz);
    }

    function renderQuizQuestion() {
      const quiz = quizPool[currentQuestionIndex];
      ui.question.textContent = `Q${currentQuestionIndex + 1}. ${quiz.question}`;
      ui.options.innerHTML = '';
      quiz.options.forEach(opt => {
        const label = document.createElement('label');
        const radio = document.createElement('input');
        radio.type = 'radio';
        radio.name = 'quiz-option';
        radio.value = opt;
        label.appendChild(radio);
        label.appendChild(document.createTextNode(opt));
        ui.options.appendChild(label);
      });
      ui.progress.textContent = `${currentQuestionIndex + 1} / ${quizPool.length}`;
    }

    async function saveProgress(percent) {
      await fetch('/api/progress', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: currentUser, score: percent })
      });
    }

    async function loadProgress() {
      const resp = await fetch(`/api/progress/${encodeURIComponent(currentUser)}`);
      const history = await resp.json();
      ui.progressList.innerHTML = history.length ? '' : '<li>No progress yet.</li>';
      history.forEach(entry => {
        const item = document.createElement('li');
        const date = new Date(entry.date).toLocaleString();
        item.textContent = `${date} - ${entry.score}%`;
        ui.progressList.appendChild(item);
      });
      setView(ui.progress);
    }

    document.getElementById('learn-btn').addEventListener('click', () => {
      renderLearn();
      setView(ui.learn);
    });

    document.getElementById('quiz-btn').addEventListener('click', startQuiz);
    document.getElementById('progress-btn').addEventListener('click', loadProgress);
    document.getElementById('learn-back-btn').addEventListener('click', () => setView(ui.activity));
    document.getElementById('progress-back-btn').addEventListener('click', () => setView(ui.activity));
    document.getElementById('quiz-cancel-btn').addEventListener('click', () => setView(ui.activity));

    document.getElementById('quiz-next-btn').addEventListener('click', async () => {
      const selected = document.querySelector('input[name="quiz-option"]:checked');
      if (!selected) { alert('Select an option first'); return; }
      if (selected.value === quizPool[currentQuestionIndex].correct) score += 1;

      currentQuestionIndex += 1;
      if (currentQuestionIndex >= quizPool.length) {
        const percent = Math.round((score / quizPool.length) * 100);
        await saveProgress(percent);
        alert(`Completed! Your score is ${score}/${quizPool.length} (${percent}%).`);
        setView(ui.activity);
      } else {
        renderQuizQuestion();
      }
    });

    (async function init() {
      await loadVocab();
      setView(ui.activity);
    })();
  </script>
</body>
</html>
